spring:
  application:
    name: tandil-trails

  datasource:
    url: jdbc:postgresql://localhost:5433/tandil_trails
    username: trails_user
    password: trails_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

jwt:
  secret: "dGFuZGlsdHJhaWxzc2VjcmV0a2V5cGFyYXByb2R1Y2Npb24xMjM0NTY3OA=="
  expiration-ms: 86400000