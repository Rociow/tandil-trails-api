spring:
  application:
    name: tandil-trails

  datasource:
    url: jdbc:postgresql://localhost:5433/tandil_trails
    username: trails_user
    password: trails_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

jwt:
  secret: "cambia-esto-por-un-secreto-largo-de-al-menos-256-bits-en-produccion"
  expiration-ms: 86400000